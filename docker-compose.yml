version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ssc_v2
      POSTGRES_USER: ssc
      POSTGRES_PASSWORD: ssc_dev_password
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssc -d ssc_v2"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports: ["3000:3000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_MODE: jwt
      JWT_SECRET: change-me-in-production
      DATABASE_URL: postgresql://ssc:ssc_dev_password@postgres:5432/ssc_v2
      REDIS_URL: redis://redis:6379
      PG_POOL_MAX: 20

volumes:
  pgdata:

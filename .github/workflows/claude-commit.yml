name: Claude Code Commit

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: 'Commit message'
        required: true
        type: string
      files_json:
        description: 'JSON array of {path, content} objects (base64 encoded content)'
        required: true
        type: string

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHATGPT_PUSH_TOKEN }}

      - name: Write files
        run: |
          echo '${{ inputs.files_json }}' | python3 -c "
          import json, sys, os, base64
          files = json.load(sys.stdin)
          for f in files:
              path = f['path']
              os.makedirs(os.path.dirname(path) if os.path.dirname(path) else '.', exist_ok=True)
              content = base64.b64decode(f['content']).decode('utf-8')
              with open(path, 'w') as fp:
                  fp.write(content)
              print(f'Wrote: {path}')
          "

      - name: Commit and push
        run: |
          git config user.name "FlowSeer Bot"
          git config user.email "bot@flowseer.ai"
          git add -A
          git diff --staged --quiet || git commit -m "${{ inputs.commit_message }}"
          git push origin main

name: SSC V2 CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - run: AUTH_MODE=headers npm test

      - run: |
          test -f src/middleware/auth.js
          test -f src/middleware/rbac.js

      - run: |
          ! grep -R "req.headers" src/routes || exit 1
